<template>
    <lightning-card title="Custom case creator form">
 <!-- Allowing users to fill mandatory fields , but this time LDS is not available-->

   <div class="slds-p-around_medium lgc-bg">
    <lightning-input  value={subject} onchange={populateSubject} name="subject" type="text" label="Enter Subject" placeholder="type here..." required ></lightning-input>
      <lightning-combobox 
           value={priority}
           onchange={populatePriority}
            name="priority"
            label="Priority"
            placeholder="Select Priority"
            options={options}
            ></lightning-combobox>
  <lightning-textarea value={description} onchange={populateDescription} name="description" label="Enter the issue you are facing"></lightning-textarea>
    </div>
    <div class="slds-p-around_small">
    <lightning-button label="create case" onclick={createCase} variant="brand"></lightning-button>
    </div>

    </lightning-card>
</template>
