<template>
    <lightning-card title="Record edit form with custom layout">
  <lightning-record-edit-form record-id ={recordId} object-api-name={objectApiName}
  onsuccess={handleFormSuccess} >
     <div class="slds-grid slds-wrap slds-p-around_small">
        <div class="slds-col slds-size_1-of-2">
             <lightning-input-field field-name="CaseNumber"></lightning-input-field>
        </div>
        <div class="slds-col slds-size_1-of-2" >
          <lightning-input-field field-name="PotentialLiability__c" required ></lightning-input-field>      
        </div>
         <div class="slds-col slds-size_1-of-2">
             <lightning-input-field field-name="Origin" ></lightning-input-field>
        </div>
         <div class="slds-col slds-size_1-of-2">
             <lightning-input-field field-name="Status" ></lightning-input-field>
        </div>
        <div class="slds-col slds-size_2-of-2">
             <lightning-input-field field-name="Closed_Reason__c" ></lightning-input-field>
        </div>
        
            <lightning-button  type="submit" class="slds-m-right_small" label="save" variant="brand"></lightning-button>
            
            <lightning-button  type="reset" label="Reset" variant="brand"></lightning-button>
        
 
</div>

  </lightning-record-edit-form>
    </lightning-card>
</template>
