<template>
    <lightning-card title="Password varification">
    <lightning-input label="Enter Password" type={inputType} onchange={handleInput} value={password}></lightning-input>
    <lightning-button label={toggleLabel} onclick={togglePassword} variant="brand"></lightning-button>
    
      <div class="strength-bar">
        <div class="bar" style={strengthStyle}></div>
      </div>
      <p class="strength-text">{strengthText}</p>

      <ul class="checklist">
           <template for:each={checklistRules} for:item="rule">
            <li key={rule.label} class={rule.class}>{rule.label}</li>
           </template>
      </ul>
    </lightning-card>
     
</template>
