<template>
    <lightning-card title="Create Contact Record" icon-name="standard:contact">
       <lightning-record-edit-form object-api-name="Contact"
       onerror={handleError}
       onsuccess={handleSuccess}
       onsubmit={handleSubmit}
       >
           <lightning-input-field field-name="FirstName"></lightning-input-field>
             <lightning-input-field field-name="LastName"></lightning-input-field>
             <div class="slds-hide">
             <lightning-input-field field-name="AccountId"></lightning-input-field>
             </div>
             <lightning-input-field field-name="LeadSource" onchange={handleLeadSourceChange}></lightning-input-field>
             <template if:true={hasAccounts}>
                <lightning-record-picker
                 object-api-name="Account"
                  label="Select Account"
                   filter={accountFilter}
                   onchange={handleAccountChange}
                   value ={selectedAccountId}>
                </lightning-record-picker>
             </template> 
             <lightning-button label="Create Contact" variant="brand" type="submit"></lightning-button>
       </lightning-record-edit-form>
    </lightning-card>
</template>
