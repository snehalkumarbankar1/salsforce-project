<template>
<lightning-card title="Create Form" icon-name="standard:contact">
    <div class="slds-p-around_medium">
       
        <template if:true={errors.length}>
             <p>Please fix this errors</p>
         <template for:each={errors} for:item="error">
           <p key={error.fieldName}>{error.errorMessage} </p>
         </template>
        </template>
    
    <lightning-input type="text" label="Name" value={name} data-field="name" onchange={handleOnChange} required></lightning-input>
    <lightning-input type="email" label="Email" value={email} data-field="email" onchange={handleOnChange} required></lightning-input>
    <lightning-input type="tel" label="Phone" value={phone} data-field="phone" onchange={handleOnChange} required></lightning-input>
      <lightning-input type="number" label="Age" value={age} data-field="age" onchange={handleOnChange} required></lightning-input>

      <lightning-button variant="brand" label="Submit" onclick={handleOnClick}></lightning-button>
   </div>
    </lightning-card>
    
</template>
