<template>
    <lightning-card class="slds-p-around_small" title="Task Records By Subject">
    <template for:each={taskList} for:item="task">
        <div key={task.id}>
            <p class="slds-m-left_small"><b>Subject: {task.Subject}</b></p>
            <p class="slds-m-left_small">Status: {task.Status}, Description: {task.Description}</p>
            </div>
        
        </template>
        </lightning-card>
</template>
